<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign-Up Form</title>
  <link rel="stylesheet" href="css/styles.css">
  <script src="js/script.js" defer></script>
</head>

<body>
  <picture id="cover-container">
    <img src="./images/halie-west-leaf-plant.jpg" alt="An image of leaves">
  </picture>
  <main>
    <div>
      <p>This is not a real online service! You know you need something like this in your life to help you realize your
        deepest dreams.</p>
      <p>Sign up now to get started.</p>
      <p>You know you want to.</p>
    </div>
    <div id="form-card">
      <p>Let's do this!</p>
      <form id="create-account" action="#" method="post">
        <label for="first-name">FIRST NAME</label>
        <input type="text" name="firstName" id="first-name">
        <label for="last-name">LAST NAME</label>
        <input type="text" name="lastName" id="last-name">
        <label for="email">EMAIL</label>
        <input type="email" name="email" id="email">
        <label for="phone-number">PHONE NUMBER</label>
        <input type="tel" name="phoneNumber" id="phone-number">
        <label for="password">PASSWORD</label>
        <input type="password" name="password" id="password">
        <label for="confirm-password">CONFIRM PASSWORD</label>
        <input type="password" name="confirmPassword" id="confirm-password">
      </form>
    </div>
    <div>
      <button type="submit" form="create-account">Create Account</button>
      <p>Already have an account? <a href="#">Login</a></p>
    </div>
  </main>
</body>

</html>
