<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign-Up Form</title>
  <link rel="stylesheet" href="css/styles.css">
  <script src="js/script.js" defer></script>
</head>

<body>
  <picture id="cover-container">
    <div id="cover-brand">
      <img src="images/odin-lined.png" alt="Odin logo">
      <h1>ODIN</h1>
    </div>
    <img src="./images/halie-west-leaf-plant.jpg" alt="An image of leaves">
  </picture>
  <main>
    <div>
      <p class="large">This is not a real online service! You know you need something like this in your life to help you
        realize your
        deepest dreams.</p>
      <p class="large">Sign up now to get started.</p>
      <p class="large">You know you want to.</p>
    </div>
    <div id="form-card">
      <p class="large"">Let's do this!</p>
      <form id="create-account" action="#" method="post">
        <div class="field">
          <label for="first-name">FIRST NAME</label>
          <input type="text" name="firstName" id="first-name" required>
        </div>
        <div class="field">
          <label for="last-name">LAST NAME</label>
          <input type="text" name="lastName" id="last-name" required>
        </div>
        <div class="field">
          <label for="email">EMAIL</label>
          <input type="email" name="email" id="email" required>
        </div>
        <div class="field">
          <label for="phone-number">PHONE NUMBER</label>
          <input type="tel" name="phoneNumber" id="phone-number">
        </div>
        <div class="field">
          <label for="password">PASSWORD</label>
          <input type="password" name="password" id="password" required minlength="8" title="Please, use a password with at least 8 characters">
        </div>
        <div class="field">
          <label for="confirm-password">CONFIRM PASSWORD</label>
          <input type="password" name="confirmPassword" id="confirm-password" required minlength="8" title="Please, use a password with at least 8 characters"> 
        </div>
      </form>
    </div>
    <div>
      <button id="create-account-button" type="submit" form="create-account">Create Account</button>
      <p>Already have an account? <a href="#">Login</a></p>
    </div>
  </main>
</body>

</html>
